# Configuración de Nginx para Tecnocell con servicio de imágenes
# Archivo: /etc/nginx/sites-available/tecnocell

server {
    listen 80;
    server_name api.tecnocell.com;  # Cambiar por tu dominio o IP de Hetzner
    
    # Logs
    access_log /var/log/nginx/tecnocell_access.log;
    error_log /var/log/nginx/tecnocell_error.log;
    
    # Tamaño máximo de subida (importante para imágenes)
    client_max_body_size 10M;
    
    # ==========================================
    # SERVIR ARCHIVOS ESTÁTICOS (IMÁGENES)
    # ==========================================
    location /uploads/ {
        # Ruta física en el servidor — debe coincidir con el bind mount de Docker:
        # /var/www/Tecnocell_storage/uploads:/app/uploads
        alias /var/www/Tecnocell_storage/uploads/;
        
        # Caché agresivo (las imágenes no cambian)
        expires 1y;
        add_header Cache-Control "public, immutable";
        
        # CORS para permitir acceso desde frontend
        add_header Access-Control-Allow-Origin *;
        
        # Evitar listado de directorios
        autoindex off;
        
        # Tipos MIME
        include /etc/nginx/mime.types;
        
        # Logs específicos para uploads
        access_log /var/log/nginx/uploads_access.log;
        error_log /var/log/nginx/uploads_error.log;
    }
    
    # ==========================================
    # PROXY PARA API (Node.js en puerto 3000)
    # ==========================================
    location /api/ {
        proxy_pass http://localhost:3000;
        
        # Headers importantes
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts aumentados para uploads
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        
        # Deshabilitar buffering para uploads grandes
        proxy_request_buffering off;
    }
    
    # ==========================================
    # FRONTEND REACT (opcional, si lo sirves desde Nginx)
    # ==========================================
    # location / {
    #     root /var/www/tecnocell/dist;
    #     try_files $uri $uri/ /index.html;
    #     
    #     # Caché para assets
    #     location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
    #         expires 1y;
    #         add_header Cache-Control "public, immutable";
    #     }
    # }
    
    # ==========================================
    # HEALTH CHECK
    # ==========================================
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}

