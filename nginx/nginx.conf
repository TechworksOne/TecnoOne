server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 10M;

    # ─── Gzip ────────────────────────────────────────────────
    gzip              on;
    gzip_types        text/plain text/css text/javascript
                      application/javascript application/json
                      image/svg+xml;
    gzip_min_length   256;
    gzip_comp_level   5;
    gzip_vary         on;

    # ─── Security headers ────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"    always;
    add_header X-Content-Type-Options "nosniff"       always;
    add_header Referrer-Policy        "same-origin"   always;
    add_header X-XSS-Protection       "1; mode=block" always;

    # ─── API proxy ───────────────────────────────────────────
    # ^~ evita que las regexes de cache capturen /api/*
    location ^~ /api/ {
        proxy_pass         http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout  60s;
        proxy_send_timeout     300s;
        proxy_read_timeout     300s;
        proxy_request_buffering off;
    }

    # ─── Uploads: servido DIRECTO por Nginx desde el volumen compartido ───────
    # Mucho más rápido que proxear a Node.js (elimina un salto de red completo).
    location ^~ /uploads/ {
        alias /var/www/uploads/;

        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";

        # Nginx sirve el archivo directamente con sendfile (zero-copy)
        sendfile           on;
        tcp_nopush         on;
        tcp_nodelay        on;

        # Si el archivo no existe, delega al backend (fallback)
        try_files $uri @uploads_fallback;
    }

    location @uploads_fallback {
        proxy_pass        http://backend:3000;
        proxy_set_header  Host            $host;
        proxy_set_header  X-Real-IP       $remote_addr;
        proxy_set_header  X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ─── SPA fallback (React Router) ─────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache largo para assets Vite (llevan hash en el nombre)
    location ~* \.(?:js|css)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~* \.(?:woff2?|ttf|eot|ico|svg|png|jpg|jpeg|gif|webp)$ {
        expires 6M;
        add_header Cache-Control "public";
        try_files $uri =404;
    }
}
